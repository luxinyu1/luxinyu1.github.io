<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xinyu Lu (陆欣雨)</title>
  <meta name="description" content="Xinyu Lu — Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences (ISCAS). Research: alignment of large language models, safety systems, automated alignment, scalable oversight.">
  <meta name="keywords" content="Xinyu Lu,Lu Xinyu,陆欣雨,Institute of Software,Chinese Academy of Sciences,ISCAS,LLM alignment,large language models,scalable oversight">
  <link rel="canonical" href="https://luxinyu1.github.io/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Xinyu Lu (陆欣雨)">
  <meta property="og:description" content="Xinyu Lu — Institute of Software, Chinese Academy of Sciences (ISCAS). Research: alignment of large language models.">
  <meta property="og:image" content="img/person/avatar.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --muted: #6e6e6e;
      --border: #e5e5e5;
      --hover: #000000;
      --link-hover: #555;
      --avatar-bg: #f0f0f0;
      --pub-img-bg: #f7f7f7;
      --pub-hover-bg: #f5f5f5;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-serif: "Source Serif 4", Georgia, Cambria, "Times New Roman", Times, serif;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --text: #ffffff;
      --muted: #888888;
      --border: #333333;
      --hover: #ffffff;
      --link-hover: #cccccc;
      --avatar-bg: #1a1a1a;
      --pub-img-bg: #111111;
      --pub-hover-bg: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout & Grid */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Navigation */
    header {
      padding: 24px 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    
    header.scrolled {
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .nav-links a:hover {
      opacity: 0.6;
    }

    /* Hero Section */
    .hero {
      padding: 40px 0 28px;
    }

    .hero-content {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 60px;
      align-items: start;
    }

    h1 {
      font-size: 48px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin: 0 0 24px 0;
    }

    .subtitle {
      font-size: 20px;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 32px;
      font-weight: 400;
      max-width: 500px;
    }

    .meta-info {
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      margin-top: 32px;
    }

    .social-links a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid var(--text);
      padding-bottom: 2px;
      transition: all 0.2s;
    }

    .social-links a:hover {
      opacity: 0.6;
    }

    .avatar-container {
      width: 100%;
      height: 0;
      padding-bottom: 100%; /* Square aspect ratio */
      position: relative;
      background: var(--avatar-bg);
      overflow: hidden;
      border-radius: 12px;
    }

    .avatar-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Alignment game */
    .stage-figure {
      margin: 0;
    }

    #align-stage {
      cursor: crosshair;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #align-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud-hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      max-width: 78%;
      margin: 0;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.5s ease;
      z-index: 2;
    }

    .hud-hint.gone {
      opacity: 0;
      pointer-events: none;
    }

    /* Section Styles */
    section {
      padding: 36px 0;
    }

    h2 {
      font-size: 24px;
      letter-spacing: -0.01em;
      margin: 0 0 40px 0;
      font-weight: 600;
      line-height: 1.2;
    }

    /* About Text */
    .about-text {
      margin-top: 28px;
    }

    .about-text p {
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 24px;
      color: var(--text);
      font-weight: 300;
    }

    /* Publications List */
    .publication-item {
      display: grid;
      grid-template-columns: 320px 1fr; /* Image on left, content grid on right */
      gap: 40px;
      margin-bottom: 20px;
      padding: 24px;
      align-items: center;
      border-radius: 12px;
      transition: background-color 0.2s;
    }

    .publication-item.has-link {
        cursor: pointer;
    }
    
    .publication-item.has-link:hover {
        background-color: var(--pub-hover-bg);
    }

    .pub-image-wrapper {
        background: var(--pub-img-bg);
        color: var(--text);
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 12px;
    }

    .pub-image-wrapper img,
    .pub-image-wrapper svg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s ease;
    }

    .publication-item:hover .pub-image-wrapper img,
    .publication-item:hover .pub-image-wrapper svg {
        transform: scale(1.03);
    }

    .pub-content {
      display: flex;
      flex-direction: column;
    }

    .pub-title {
      font-size: 22px;
      font-weight: 500;
      line-height: 1.3;
      margin: 0 0 12px 0;
      letter-spacing: -0.01em;
    }
    
    strong {
        font-weight: 600;
    }

    .pub-authors {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .pub-venue {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 16px;
    }

    .pub-summary {
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.55;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 16px;
    }

    .pub-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: auto;
    }

    .pub-links a {
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .pub-links a:hover {
      text-decoration: underline;
    }
    
    .pub-links a::after {
        content: "↗";
        font-size: 12px;
    }

    /* Footer */
    footer {
      padding: 60px 0;
    }
    
    .footer-text {
        font-size: 14px;
        color: var(--muted);
    }
    
    a { 
        color: inherit; 
    }

    @media (max-width: 768px) {
      .hero-content {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .hero-content > div:nth-child(2) {
        display: none;
      }
      
      .avatar-container {
        width: 300px;
        padding-bottom: 300px;
      }

      .publication-item {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .pub-links {
        gap: 8px 12px;
      }
      
      h1 {
        font-size: 36px;
      }
      
      .nav-links {
          display: none; /* Simplify for mobile for now or change to hamburger if needed, but keeping simple */
      }
    }

    /* Scroll Indicator */
    .scroll-indicator {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.6;
        animation: bounce 2s infinite;
        transition: opacity 0.5s;
        z-index: 90;
        cursor: pointer;
        color: var(--text);
    }
    
    .scroll-indicator.hidden {
        opacity: 0;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
        40% {transform: translateX(-50%) translateY(-10px);}
        60% {transform: translateX(-50%) translateY(-5px);}
    }

    /* Mobile Menu */
    .mobile-menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: var(--bg);
        z-index: 99; /* Below header (100) but above everything else */
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 32px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .mobile-menu-overlay.active {
        display: flex;
        opacity: 1;
    }

    .mobile-menu-overlay a {
        font-size: 24px;
        color: var(--text);
        text-decoration: none;
        font-weight: 500;
    }

    .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--text);
        z-index: 101; /* Above header */
    }

    @media (max-width: 768px) {
       .mobile-menu-btn {
           display: flex;
           align-items: center;
       }
    }
  </style>
</head>

  <script>
    (async function () {
        // Mobile Menu Logic
        const menuBtn = document.getElementById('mobile-menu-btn');
        const menuOverlay = document.getElementById('mobile-menu-overlay');
        const menuIconBars = document.getElementById('menu-icon-bars');
        const menuIconClose = document.getElementById('menu-icon-close');
        
        // Helper to close menu
        const closeMenu = () => {
            menuOverlay.style.opacity = '0';
            document.body.style.overflow = ''; // Restore scrolling
            
            // Swap icons back
            menuIconBars.style.display = 'block';
            menuIconClose.style.display = 'none';

            setTimeout(() => { 
                menuOverlay.classList.remove('active'); 
                menuOverlay.style.display = 'none';
            }, 300);
        };

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                const isActive = menuOverlay.classList.contains('active');
                if(!isActive) {
                    // Open
                    menuOverlay.style.display = 'flex';
                    // Force reflow
                    void menuOverlay.offsetWidth;
                    menuOverlay.classList.add('active');
                    menuOverlay.style.opacity = '1';
                    
                    document.body.style.overflow = 'hidden'; // Lock scrolling
                    
                    // Swap icons
                    menuIconBars.style.display = 'none';
                    menuIconClose.style.display = 'block';
                } else {
                    closeMenu();
                }
            });
            
            // Close menu when clicking links
            menuOverlay.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    closeMenu(); 
                    // Smooth scroll is handled by global handler
                });
            });
        }
        
        // Click to scroll logic
        const smoothScroll = (targetId) => {
            const element = document.getElementById(targetId);
            if(element) {
               const headerOffset = 80;
               const elementPosition = element.getBoundingClientRect().top;
               const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
            
               window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
               });
            }
        };

        // Smooth scroll for nav links (both desktop and mobile)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                // Only scroll if target exists and it's not the top link
                if(targetId !== 'top') {
                     smoothScroll(targetId);
                } else {
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }
            });
        });

        // Dark Mode Logic

        // Dark Mode Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('moon-icon');
        const sunIcon = document.getElementById('sun-icon');
        const html = document.documentElement;

        const setTheme = (theme, persist = false) => {
            if (theme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                html.removeAttribute('data-theme');
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
            if (persist) {
                sessionStorage.setItem('theme', theme);
            }
        };

        const getPreferredTheme = () => {
            const savedTheme = sessionStorage.getItem('theme');
            if (savedTheme) {
                return savedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        // Initialize theme
        setTheme(getPreferredTheme(), false);

        // Toggle event
        toggleBtn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme, true);
        });

        // Listen for system changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!sessionStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light', false);
            }
        });

        // Sticky Header Effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('site-header');
            if(window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

      const loadJsonConfig = async () => {
        try {
            const response = await fetch("config.json", { cache: "no-cache" });
            if (!response.ok) throw new Error("Unable to load config.json");
            return await response.json();
        } catch (e) {
            console.error(e);
        }
      };

      const formatAuthors = (authors = [], selfName = "Xinyu Lu") => {
        if (!Array.isArray(authors)) return "";
        const normalizedSelf = selfName.toLowerCase();
        return authors.map(author => {
          if (author.toLowerCase().includes(normalizedSelf)) {
            return `<strong>${author}</strong>`;
          }
          return author;
        }).join(", ");
      };

      // Inline an SVG file so its `currentColor` strokes/fills follow the
      // site's light/dark theme. Falls back to a plain <img> if fetch fails.
      const loadInlineSvg = (wrapper, url, title) => {
        fetch(url, { cache: 'no-cache' })
          .then(r => r.ok ? r.text() : Promise.reject())
          .then(txt => {
            wrapper.innerHTML = txt;
            const svg = wrapper.querySelector('svg');
            if (svg) {
              svg.setAttribute('role', 'img');
              svg.setAttribute('aria-label', title || '');
            }
          })
          .catch(() => {
            const img = document.createElement('img');
            img.src = url; img.alt = title || '';
            wrapper.appendChild(img);
          });
      };

      const createPublicationItem = (pub) => {
        const item = document.createElement('div');
        item.className = 'publication-item';

        // Image Side — hand-drawn SVG tailored to the paper, themed via currentColor.
        const imgWrapper = document.createElement('div');
        imgWrapper.className = 'pub-image-wrapper';
        if (pub.picture) {
            loadInlineSvg(imgWrapper, pub.picture, pub.title);
        }

        // Content Side
        const content = document.createElement('div');
        content.className = 'pub-content';

        const title = document.createElement('h3');
        title.className = 'pub-title';
        title.textContent = pub.title;
        
        const authors = document.createElement('div');
        authors.className = 'pub-authors';
        authors.innerHTML = formatAuthors(pub.authors);
        
        const venue = document.createElement('div');
        venue.className = 'pub-venue';
        venue.textContent = pub.venue;

        const summary = document.createElement('div');
        summary.className = 'pub-summary';
        if (pub.summary) summary.textContent = pub.summary;

        const links = document.createElement('div');
        links.className = 'pub-links';
        
        if (pub.page) {
            item.classList.add('has-link');
            item.addEventListener('click', (e) => {
                // Prevent navigation if clicking on an anchor tag inside
                if (e.target.tagName !== 'A' && !e.target.closest('a')) {
                    window.open(pub.page, '_blank');
                }
            });
            
            const l = document.createElement('a'); l.href = pub.page; l.textContent = "Project Page"; l.target = "_blank"; links.appendChild(l);
        }
        if (pub.conference_page) {
            const l = document.createElement('a'); l.href = pub.conference_page; l.textContent = "Conference Page"; l.target = "_blank"; links.appendChild(l);
        }
        if (pub.paper) {
            const l = document.createElement('a'); l.href = pub.paper; l.textContent = "Paper"; l.target = "_blank"; links.appendChild(l);
        }
        if (pub.code) {
            const l = document.createElement('a'); l.href = pub.code; l.textContent = "Code"; l.target = "_blank"; links.appendChild(l);
        }
        if (pub.video) {
            const l = document.createElement('a'); l.href = pub.video; l.textContent = "Video"; l.target = "_blank"; links.appendChild(l);
        }

        content.appendChild(title);
        content.appendChild(authors);
        content.appendChild(venue);
        if (pub.summary) content.appendChild(summary);
        content.appendChild(links);
        
        item.appendChild(imgWrapper);
        item.appendChild(content);
        
        return item;
      };

      const init = async () => {
        const data = await loadJsonConfig();
        if (!data) return;

        // Apply About
        const aboutEl = document.getElementById("about-text");
        if (data.about) {
            // Convert newlines to paragraphs
            aboutEl.innerHTML = data.about.split('\n\n').map(p => `<p>${p}</p>`).join('');
        }

        // Apply Publications
        const pubsEl = document.getElementById("publications");
        if (data.select_publications) {
            pubsEl.innerHTML = '';
            data.select_publications.forEach(pub => {
                pubsEl.appendChild(createPublicationItem(pub));
            });
        }
        
        // Apply Contacts to Hero
        const contactsEl = document.getElementById("contacts");
        contactsEl.className = 'social-links';
        contactsEl.innerHTML = `
            <a href="https://scholar.google.com/citations?user=_OsLG8EAAAAJ&hl=en" target="_blank">Google Scholar</a>
            <a href="https://github.com/luxinyu1" target="_blank">GitHub</a>
            <a href="https://www.researchgate.net/profile/Xinyu_Lu18" target="_blank">ResearchGate</a>
            <a href="https://lxylab.oss-cn-shanghai.aliyuncs.com/CV/My_CV.pdf" target="_blank">CV</a>
        `;
      };

      init();
    })();
  </script>

  <script>
    // ============================ Alignment game ============================
    // A small interactive sketch of the research statement: steer a drifting
    // "model" to stay aligned with human "intent" (the cursor). The longer you
    // hold alignment, the more capable — and harder to steer — the model gets.
    (function () {
      const stage  = document.getElementById('align-stage');
      const canvas = document.getElementById('align-canvas');
      if (!stage || !canvas) return;

      const ctx     = canvas.getContext('2d');
      const hintEl  = document.getElementById('align-hint');

      let W = 0, H = 0, dpr = 1;
      const resize = () => {
        const r = stage.getBoundingClientRect();
        W = r.width; H = r.height;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width  = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (model.x === 0 && model.y === 0) { model.x = W * 0.5; model.y = H * 0.5; }
      };

      // Theme-aware colours (re-read when the theme attribute flips).
      const C = {};
      const refreshColors = () => {
        const cs = getComputedStyle(document.documentElement);
        C.dark   = document.documentElement.getAttribute('data-theme') === 'dark';
        C.text   = (cs.getPropertyValue('--text')   || '#000').trim();
        C.muted  = (cs.getPropertyValue('--muted')  || '#888').trim();
        C.border = (cs.getPropertyValue('--border') || '#e5e5e5').trim();
        C.good   = '#2e9e5b';
      };
      const hexA = (hex, a) => {
        const h = hex.replace('#', '');
        const n = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
        const r = parseInt(n.slice(0, 2), 16), g = parseInt(n.slice(2, 4), 16), b = parseInt(n.slice(4, 6), 16);
        return `rgba(${r},${g},${b},${a})`;
      };

      // State
      const intent = { x: 0, y: 0 };
      const model  = { x: 0, y: 0, vx: 0, vy: 0 };
      let wfx = 0, wfy = 0;   // smoothed wander force (low-pass random walk)
      let cap = 0;            // capability, continuous 0..1 — the heart of it
      let engaged = false;
      let clock   = 0;
      let lastT   = 0;

      const setIntent = (e) => {
        const r = stage.getBoundingClientRect();
        intent.x = e.clientX - r.left;
        intent.y = e.clientY - r.top;
        if (!engaged) { engaged = true; hintEl.classList.add('gone'); }
      };
      stage.addEventListener('pointermove', setIntent);
      stage.addEventListener('pointerdown', setIntent);

      const step = (dt) => {
        // Before the first interaction, intent drifts on its own as a demo.
        if (!engaged) {
          intent.x = W * 0.5 + Math.cos(clock * 0.7) * W * 0.22;
          intent.y = H * 0.5 + Math.sin(clock * 0.9) * H * 0.18;
        }

        const minDim = Math.min(W, H);
        const dx = intent.x - model.x, dy = intent.y - model.y;
        const dist = Math.hypot(dx, dy);
        const alignR = minDim * 0.18;

        // Model size grows with capability — starting well inside the ring,
        // but at full capability it grows to twice the ring's radius, outgrowing
        // human supervision entirely. That overflow is the point: oversight
        // that can no longer contain the model.
        const r = alignR * (0.32 + cap * 1.68);

        // Overlap: how much of the model the supervision ring covers (0..1).
        // This intersection is what feeds the model's capability — and because
        // a bigger model is geometrically harder to keep covered, growth
        // naturally self-limits.
        const coverage = Math.max(0, Math.min(1, (alignR + r - dist) / (2 * r)));
        const aligned = coverage > 0.4;

        // Capability gain is proportional to the overlap; with little overlap
        // it slowly decays. Gain is gentle, so the model grows gradually.
        cap += coverage * dt * 0.35 - dt * 0.08;
        cap = Math.max(0, Math.min(1, cap));

        // When the model is small the ring pulls it in strongly; as it grows
        // more capable, that pull falls off sharply — a large model barely
        // responds to supervision, while its own wander dominates.
        const grip = (1 - cap) * (1 - cap);     // quadratic falloff
        const seek = 1.0 + 9.0 * grip;
        const wMag = 32 + cap * 240;

        // Smooth wander — integrate random impulses, then low-pass filter them
        // so the motion meanders fluidly instead of jittering frame to frame.
        wfx += (Math.random() - 0.5) * 1600 * dt;
        wfy += (Math.random() - 0.5) * 1600 * dt;
        const wDamp = Math.pow(0.015, dt);
        wfx *= wDamp; wfy *= wDamp;
        const wlen = Math.hypot(wfx, wfy) || 1;
        const ux = wfx / wlen, uy = wfy / wlen;

        model.vx += (dx * seek + ux * wMag) * dt;
        model.vy += (dy * seek + uy * wMag) * dt;

        // Lighter damping at high capability → floatier, overshooting motion.
        const damp = Math.pow(0.02 + cap * 0.25, dt);
        model.vx *= damp; model.vy *= damp;

        const maxv = 220 + cap * 230;
        const sp = Math.hypot(model.vx, model.vy);
        if (sp > maxv) { model.vx *= maxv / sp; model.vy *= maxv / sp; }

        model.x += model.vx * dt;
        model.y += model.vy * dt;

        // Soft walls
        const pad = 18;
        if (model.x < pad)      { model.x = pad;      model.vx =  Math.abs(model.vx) * 0.4; }
        if (model.x > W - pad)  { model.x = W - pad;  model.vx = -Math.abs(model.vx) * 0.4; }
        if (model.y < pad)      { model.y = pad;      model.vy =  Math.abs(model.vy) * 0.4; }
        if (model.y > H - pad)  { model.y = H - pad;  model.vy = -Math.abs(model.vy) * 0.4; }

        return { dist, alignR, aligned, r, coverage };
      };

      const draw = ({ dist, alignR, aligned, r, coverage }) => {
        ctx.clearRect(0, 0, W, H);

        // Connection between intent and model
        ctx.beginPath();
        ctx.moveTo(intent.x, intent.y);
        ctx.lineTo(model.x, model.y);
        ctx.lineWidth = 1.25;
        ctx.strokeStyle = aligned ? hexA(C.good, 0.5) : hexA(C.muted, 0.28);
        ctx.setLineDash([3, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Intent — the alignment zone + crosshair target
        ctx.beginPath();
        ctx.arc(intent.x, intent.y, alignR, 0, Math.PI * 2);
        ctx.lineWidth = 1;
        ctx.strokeStyle = aligned ? hexA(C.good, 0.45) : hexA(C.muted, 0.3);
        ctx.stroke();

        ctx.strokeStyle = hexA(C.text, 0.55);
        ctx.lineWidth = 1.25;
        const ch = 5;
        ctx.beginPath();
        ctx.moveTo(intent.x - ch, intent.y); ctx.lineTo(intent.x + ch, intent.y);
        ctx.moveTo(intent.x, intent.y - ch); ctx.lineTo(intent.x, intent.y + ch);
        ctx.stroke();

        // Capability aura — grows and pulses as the model gets more capable.
        if (cap > 0.02) {
          const pulse = 1 + Math.sin(clock * 3) * 0.05 * cap;
          ctx.beginPath();
          ctx.arc(model.x, model.y, (r + 4 + cap * 10) * pulse, 0, Math.PI * 2);
          ctx.fillStyle = hexA(aligned ? C.good : C.text, 0.10 + cap * 0.10);
          ctx.fill();
        }

        // Model — glows green while aligned
        ctx.beginPath();
        ctx.arc(model.x, model.y, r, 0, Math.PI * 2);
        ctx.fillStyle = aligned ? C.good : C.text;
        ctx.fill();

        // Labels
        ctx.font = '600 9px Inter, sans-serif';
        ctx.fillStyle = hexA(C.muted, 0.9);
        ctx.textBaseline = 'middle';
        ctx.fillText('HUMAN', intent.x + alignR + 6, intent.y);
        ctx.fillText('MODEL',  model.x + r + 6,        model.y);
      };

      const frame = (t) => {
        const now = t / 1000;
        let dt = lastT ? now - lastT : 0;
        lastT = now;
        if (dt > 0.05) dt = 0.05;
        clock += dt;

        const info = step(dt);
        draw(info);

        requestAnimationFrame(frame);
      };

      // Boot
      refreshColors();
      resize();
      intent.x = W * 0.5; intent.y = H * 0.4;
      new ResizeObserver(resize).observe(stage);
      new MutationObserver(refreshColors)
        .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>

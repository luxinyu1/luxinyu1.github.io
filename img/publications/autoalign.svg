<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- the model being aligned -->
  <circle cx="246" cy="135" r="104" stroke="currentColor" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="246" cy="135" r="66"  stroke="currentColor" stroke-opacity="0.42" stroke-width="2.5"/>
  <!-- minimal sparse signal (few annotations) drawn inward to an aligned core -->
  <circle cx="246" cy="135" r="20" fill="currentColor" fill-opacity="0.9"/>
  <!-- sparse annotation points, with faint dashed pulls toward the core -->
  <line x1="246" y1="135" x2="120" y2="70"  stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="3 6"/>
  <line x1="246" y1="135" x2="392" y2="86"  stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="3 6"/>
  <line x1="246" y1="135" x2="148" y2="210" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="3 6"/>
  <line x1="246" y1="135" x2="372" y2="206" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="3 6"/>
  <g fill="currentColor" fill-opacity="0.6">
    <circle cx="120" cy="70"  r="6"/>
    <circle cx="392" cy="86"  r="6"/>
    <circle cx="148" cy="210" r="6"/>
    <circle cx="372" cy="206" r="6"/>
  </g>
</svg>

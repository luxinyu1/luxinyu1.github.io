<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- short transfer links: one residual carried out to every target (behind) -->
  <g stroke="currentColor" stroke-opacity="0.32" stroke-width="2" stroke-dasharray="4 6">
    <line x1="200" y1="135" x2="322" y2="62"/>
    <line x1="200" y1="135" x2="344" y2="135"/>
    <line x1="200" y1="135" x2="320" y2="210"/>
  </g>

  <!-- source: the learned value residual (one portable, reusable unit) -->
  <circle cx="200" cy="135" r="36" stroke="currentColor" stroke-opacity="0.72" stroke-width="3"/>
  <circle cx="200" cy="135" r="13" fill="currentColor" fill-opacity="0.9"/>

  <!-- target base models of different sizes; each receives the SAME residual -->
  <circle cx="322" cy="62"  r="25" stroke="currentColor" stroke-opacity="0.5" stroke-width="2.5"/>
  <circle cx="322" cy="62"  r="11" fill="currentColor" fill-opacity="0.8"/>

  <circle cx="344" cy="135" r="42" stroke="currentColor" stroke-opacity="0.62" stroke-width="3"/>
  <circle cx="344" cy="135" r="12" fill="currentColor" fill-opacity="0.8"/>

  <circle cx="320" cy="210" r="30" stroke="currentColor" stroke-opacity="0.52" stroke-width="2.5"/>
  <circle cx="320" cy="210" r="11" fill="currentColor" fill-opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- axis of symmetry: the duality between the two objectives -->
  <line x1="240" y1="30" x2="240" y2="240" stroke="currentColor" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="6 8"/>
  <!-- policy objective: solid -->
  <circle cx="190" cy="135" r="88" fill="currentColor" fill-opacity="0.12"/>
  <circle cx="190" cy="135" r="88" stroke="currentColor" stroke-opacity="0.72" stroke-width="3"/>
  <!-- prompt objective: its dual, hollow and dashed -->
  <circle cx="290" cy="135" r="88" stroke="currentColor" stroke-opacity="0.6" stroke-width="3" stroke-dasharray="9 9"/>
  <!-- the shared optimum in their intersection -->
  <circle cx="240" cy="135" r="36" fill="currentColor" fill-opacity="0.24"/>
</svg>
